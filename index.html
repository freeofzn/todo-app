<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📝 My Todo List</h1>
        
        <div class="input-section">
            <input 
                type="text" 
                id="todoInput" 
                class="todo-input" 
                placeholder="할 일을 입력하세요..."
                autocomplete="off"
            >
            <button id="addBtn" class="add-btn">추가</button>
        </div>

        <div class="filter-section">
            <button class="filter-btn active" data-filter="all">전체</button>
            <button class="filter-btn" data-filter="active">진행중</button>
            <button class="filter-btn" data-filter="completed">완료됨</button>
        </div>

        <ul id="todoList" class="todo-list"></ul>

        <div class="stats">
            <span id="totalCount">총: 0</span>
            <span id="completedCount">완료: 0</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
